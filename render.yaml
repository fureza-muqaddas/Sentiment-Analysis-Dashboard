services:
  - type: web
    name: finsentinel
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: NEWS_API_KEY
        sync: false   # set manually in Render dashboard
    autoDeploy: true
